<style>
:root{--bg:#020912;--panel:rgba(5,22,35,.88);--line:#2c7294;--cyan:#6fd8ff;--green:#86ff72;--gold:#d7a941;--red:#ff5c68;--text:#ecf7ff;--muted:#a9bed0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#020912;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.app{height:100dvh;width:100vw;overflow:hidden;background:radial-gradient(circle at 40% 0,#12344a 0,#03111c 45%,#01060b 100%)}button,input,select{font:inherit}.hidden{display:none!important}
.title{height:100dvh;overflow:auto;background:linear-gradient(rgba(0,8,14,.18),rgba(0,8,14,.72)),url('event_victory.png') center/cover no-repeat;padding:calc(12px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column;justify-content:flex-start}.brand{text-align:center;text-shadow:0 3px 10px #000;margin:0 auto 12px}.brand h1{margin:0;font-size:32px;line-height:.94;letter-spacing:.05em;font-weight:1000}.brand .sub{letter-spacing:.45em;margin-top:5px;font-weight:900}.panel{background:linear-gradient(180deg,rgba(7,30,46,.92),rgba(3,16,26,.92));border:1px solid rgba(103,211,255,.35);border-radius:22px;box-shadow:0 18px 38px rgba(0,0,0,.5);padding:14px;margin:0 auto 12px;width:100%;max-width:720px}.panel h2{margin:0 0 10px;text-align:center;letter-spacing:.16em;font-weight:1000}.setupGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.setupGrid button,.primary,.secondary,.danger{border:1px solid rgba(103,211,255,.28);border-radius:14px;background:rgba(9,45,70,.9);color:var(--text);font-weight:1000;padding:13px 8px;min-width:0}.primary{background:linear-gradient(#20a55c,#0d773e);border-color:#3bd779}.danger{background:linear-gradient(#93313d,#5d1722);border-color:#e4606d}.secondary{background:rgba(9,45,70,.9)}.slot{display:grid;grid-template-columns:76px 1fr auto;gap:12px;align-items:center;border:1px solid rgba(103,211,255,.25);border-radius:18px;padding:10px;margin:10px 0;background:rgba(0,9,15,.55)}.token{width:68px;height:68px;border-radius:50%;object-fit:cover;box-shadow:0 3px 12px #000;border:1px solid rgba(255,221,124,.65)}.slot h3{margin:0;font-size:19px}.slot p{margin:2px 0 0;color:var(--muted)}.badge{font-size:12px;letter-spacing:.12em;font-weight:1000;border-radius:999px;padding:9px 12px;background:#735914;color:#ffe790}.ready{background:#116a34;color:#bcffba}.loginRow{display:flex;gap:8px}.loginRow input{min-width:0;flex:1;border:1px solid rgba(103,211,255,.32);border-radius:14px;background:#061a2a;color:#fff;padding:14px}.loginRow input.pin{flex:0 0 84px;text-align:center;letter-spacing:.3em}
.game{height:100dvh;padding:calc(8px + env(safe-area-inset-top)) 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-rows:64px minmax(0,1fr) 25dvh;gap:8px}.top{display:grid;grid-template-columns:116px 1fr 130px;gap:8px;align-items:stretch}.commit{border-radius:16px;border:1px solid #42d783;background:linear-gradient(#1fa55d,#0b6d39);color:white;font-weight:1000;font-size:14px;letter-spacing:.08em}.commit[disabled]{filter:grayscale(1);opacity:.55}.timeBox,.statusBox,.shipBox{border:1px solid rgba(103,211,255,.28);border-radius:16px;background:linear-gradient(180deg,rgba(7,29,45,.95),rgba(3,15,25,.95));padding:8px}.timeBox{text-align:center}.timeBox .t{font-size:24px;font-weight:1000}.timeBox .turn{font-size:12px;color:var(--muted);letter-spacing:.14em}.shipBox{display:none}.statusBox{font-size:11px;display:grid;gap:2px}.check{display:flex;justify-content:space-between;gap:4px;align-items:center;white-space:nowrap}.yes{color:var(--green);font-weight:1000}.no{color:#587080;font-weight:1000}
.chartWrap{position:relative;border:1px solid rgba(103,211,255,.36);border-radius:18px;overflow:hidden;background:#051928;touch-action:none;min-height:0}.chart{position:absolute;left:0;top:0;width:900px;height:900px;transform-origin:0 0;background:linear-gradient(rgba(8,37,56,.48),rgba(8,37,56,.48)),url('event_radar.png') center/cover no-repeat}.chart:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(110,216,255,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(110,216,255,.22) 1px,transparent 1px);background-size:45px 45px}.island{position:absolute;border-radius:42% 58% 50% 38%;background:radial-gradient(#607c42,#314d2a);border:3px solid rgba(189,226,139,.75);box-shadow:8px 8px 0 rgba(118,145,91,.28)}.ring{position:absolute;border:3px dashed;border-radius:50%;transform:translate(-50%,-50%);opacity:.85;pointer-events:none}.r6{border-color:#67d66b}.r12{border-color:#ff5c68}.r18{border-color:#55cfff}.track{position:absolute;transform:translate(-50%,-50%);z-index:4}.sym{width:34px;height:34px;filter:drop-shadow(0 3px 3px #000);display:inline-block}.sym.unk{background:#ffdf5f;border:3px solid #493600;border-radius:46% 54% 45% 55%;clip-path:polygon(50% 0,65% 31%,100% 50%,65% 69%,50% 100%,35% 69%,0 50%,35% 31%)}.sym.friend{border-radius:50%;background:#6fd8ff;border:3px solid #04121a}.sym.neutral{background:#6aff72;border:3px solid #113b18}.sym.hostile{background:#ff6670;border:3px solid #491015;transform:rotate(45deg)}.label{position:absolute;left:31px;top:3px;font-weight:1000;font-size:20px;text-shadow:0 2px 2px #000,0 0 4px #000}.own .label{left:42px}.selectBox,.radarBox,.lookoutBox,.gunBox{position:absolute;transform:translate(-50%,-50%);border:3px solid;z-index:3;pointer-events:none}.selectBox{width:68px;height:68px;border-color:#fff}.radarBox{width:84px;height:72px;border-color:#6fd8ff}.lookoutBox{width:74px;height:74px;border-radius:50%;border-color:#7cff8b}.gunBox{width:76px;height:76px;border-color:#ff6472;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}.tag{position:absolute;transform:translate(-50%,-50%);font-size:12px;font-weight:1000;letter-spacing:.08em;padding:4px 6px;border-radius:6px;background:rgba(0,8,14,.8);z-index:5}.tag.radar{color:#6fd8ff}.tag.lookout{color:#7cff8b}.tag.gun{color:#ff6472}.vector,.radarVector,.trailDot{position:absolute;z-index:2}.trailDot{width:8px;height:8px;background:#6fd8ff;border-radius:50%;opacity:.75}.zoomBtns{position:absolute;right:10px;top:10px;display:grid;gap:8px;z-index:8}.zoomBtns button{width:52px;height:52px;border-radius:14px;border:1px solid rgba(103,211,255,.35);background:rgba(3,16,26,.75);color:#fff;font-size:28px;font-weight:1000}.control{border:1px solid rgba(103,211,255,.3);border-radius:18px;background:rgba(3,16,26,.9);display:grid;grid-template-columns:42% 1fr;gap:10px;padding:10px;min-height:0}.compass{position:relative;border:1px solid rgba(103,211,255,.25);border-radius:16px;background:rgba(7,28,43,.75);display:flex;align-items:center;justify-content:center;min-height:0}.compass svg{width:min(100%,23dvh);height:min(100%,23dvh)}.courseText{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-weight:1000;color:var(--green);font-size:26px}.speedBox{display:grid;grid-template-rows:auto 1fr auto;align-items:center}.speedBox h3{margin:0;letter-spacing:.18em;font-size:14px}.speedText{font-size:34px;font-weight:1000;color:var(--green);text-align:center}.speedBox input{width:100%;accent-color:#6fd8ff}.orderChecks{display:flex;gap:6px;flex-wrap:wrap;font-size:12px}.chip{border:1px solid rgba(103,211,255,.25);border-radius:999px;padding:6px 8px;background:rgba(6,33,51,.9)}
.modalShade{position:fixed;inset:0;background:rgba(0,5,9,.72);z-index:40;display:flex;align-items:center;justify-content:center;padding:16px}.modal{width:min(700px,100%);max-height:88dvh;overflow:auto;background:linear-gradient(180deg,rgba(8,32,49,.98),rgba(3,13,22,.98));border:1px solid rgba(103,211,255,.38);border-radius:22px;padding:16px;box-shadow:0 25px 70px #000}.modal h2{margin:0 0 10px;font-size:28px}.modal p{color:#c7d8e4;line-height:1.35}.modalBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.contactActions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.contactActions button{padding:12px 6px;border-radius:12px;border:1px solid rgba(103,211,255,.35);background:#103a59;color:#fff;font-weight:900}.contactActions .lookout{border-color:#69e978}.contactActions .gun{border-color:#ff6472;background:#651925}.signal{font-family:"Courier New",monospace;background:#e9dcc4;color:#16212b;border-radius:10px;padding:16px;white-space:pre-wrap}.waiting{text-align:center}.waiting .big{font-size:44px;color:var(--green);font-weight:1000}
@media (max-height:760px){.game{grid-template-rows:58px minmax(0,1fr) 27dvh}.top{grid-template-columns:104px 1fr 112px}.brand h1{font-size:28px}.control{padding:8px}.speedText{font-size:28px}.courseText{font-size:22px}.commit{font-size:12px}.token{width:58px;height:58px}.slot{grid-template-columns:64px 1fr auto}}
</style>

<body><div id="app" class="app"></div>
<script>
const SUPABASE_URL='https://jxlfaxspqwrypuqyicgo.supabase.co';
const SUPABASE_KEY='sb_publishable_y8HU_XOU7JTUTZdqEqxTyQ_wZWgEwP-';
const DB_TABLE='dragon_squadron_state';
const DB_ID='main_mobile_v9';
let sb=null;try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)}catch(e){}
const SHIPS=[['peacock','HMS Peacock P239','peacock_token.png'],['plover','HMS Plover P240','plover_token.png'],['starling','HMS Starling P241','starling_token.png'],['swallow','HMS Swallow P242','swallow_token.png'],['swift','HMS Swift P243','swift_token.png']];
let state=null, me=null, selected=null, pan={x:0,y:0,z:0.78}, touch=null;
function shuffle(a){return a.sort(()=>Math.random()-.5)} function now(){return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} function fmtTime(){let m=state.timeMins||480;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')} function saveLocal(){localStorage.setItem(DB_ID,JSON.stringify(state))}
async function load(){if(sb){let {data}=await sb.from(DB_TABLE).select('state').eq('id',DB_ID).maybeSingle(); if(data?.state) state=data.state} if(!state){let s=localStorage.getItem(DB_ID); if(s) state=JSON.parse(s)} if(!state) state=newState(); render(); if(sb){sb.channel('state').on('postgres_changes',{event:'*',schema:'public',table:DB_TABLE,filter:'id=eq.'+DB_ID},p=>{if(p.new?.state){state=p.new.state;render()}}).subscribe()} }
async function persist(){saveLocal(); if(sb) await sb.from(DB_TABLE).upsert({id:DB_ID,state,updated_at:new Date().toISOString()})}
function newState(){return {version:'mobile-v9',phase:'empty',serial:'N-'+new Date().toISOString().slice(0,10).replaceAll('-','')+'-'+Math.floor(10+Math.random()*89),playerCount:0,turn:1,timeMins:480,slots:[],tracks:[],orders:{},intel:{},submitted:{},reports:{},log:[],firstSubmittedAt:null,scoreboard:[]}}
function makeSerial(n){let chosen=shuffle(SHIPS.slice()).slice(0,n); state={...newState(),phase:'setup',playerCount:n,slots:chosen.map((s,i)=>({slot:i+1,key:s[0],name:s[1],img:s[2],claimed:false,player:'',pin:''}))}; genTracks(); state.log.push(`Serial created for ${n} players (${now()})`); persist();render()}
function allClaimed(){return state.slots.length&&state.slots.every(s=>s.claimed)} function activeSlots(){return state.slots.filter(s=>s.claimed)} function mine(){return state.slots.find(s=>s.key===me)} function order(){let m=mine(); if(!m)return null; state.orders[m.key] ||= {course:0,speed:10,radar:null,lookout:null,gun:null}; return state.orders[m.key]}
function genTracks(){let positions=[[420,430],[140,220],[780,230],[180,540],[300,575],[700,510],[815,315],[520,740],[250,760],[690,700],[125,680],[760,140]]; state.tracks=positions.map((p,i)=>({id:1012+i,x:p[0],y:p[1],course:Math.floor(Math.random()*360),speed:6+Math.floor(Math.random()*15),type:'unk',size:['small','medium','large'][i%3],history:[]})); state.own={x:430,y:390,course:145,speed:12,id:1001}; }
function render(){let app=document.getElementById('app'); if(!me && localStorage.getItem(DB_ID+'_me')) me=localStorage.getItem(DB_ID+'_me'); if(me && !state.slots?.some(s=>s.key===me)) {localStorage.removeItem(DB_ID+'_me'); me=null;} if(state.phase==='setup'&&allClaimed()) state.phase='active'; if(state.phase==='empty'||state.phase==='setup'||!allClaimed()||!me) return renderTitle(app); if(state.submitted[me]) return renderWaiting(app); renderGame(app)}
function renderTitle(app){app.innerHTML=`<div class="title"><div class="brand"><h1>DRAGON<br>SQUADRON</h1><div class="sub">SURFEX</div></div><div class="panel"><h2>EXERCISE ACCESS</h2>${state.phase==='empty'?`<p>Select player count. This appears only when no active serial exists.</p><div class="setupGrid">${[2,3,4,5].map(n=>`<button onclick="makeSerial(${n})">${n} PLAYERS</button>`).join('')}</div>`:`<div style="display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px"><div class="secondary">Serial<br><b style="color:var(--green);font-size:22px">${state.serial}</b></div><div class="secondary">Slots<br><b style="color:var(--green);font-size:22px">${activeSlots().length}/${state.playerCount}</b></div></div>${state.slots.map(s=>`<div class="slot"><img class="token" src="${s.img}"><div><h3>Player ${s.slot} — ${s.name}</h3><p>${s.claimed?s.player:'Not yet claimed'}</p></div>${s.claimed?`<span class="badge ready">READY</span>`:`<button class="badge" onclick="claim('${s.key}')">CLAIM</button>`}</div>`).join('')}${allClaimed()?`<div class="panel" style="margin:10px 0 0;padding:10px"><h2 style="font-size:16px">ENTER EXERCISE</h2><div class="loginRow"><select id="loginShip" class="secondary" style="flex:1">${state.slots.map(s=>`<option value="${s.key}">${s.name}</option>`)}</select><input id="loginPin" class="pin" placeholder="PIN" maxlength="3" inputmode="numeric"><button class="primary" onclick="login()">ENTER</button></div></div>`:''}`}</div><div class="panel"><button class="secondary" onclick="showDashboard()">Dashboard</button> <button class="secondary" onclick="showScore()">Scoreboard</button></div></div>`}
function claim(key){let s=state.slots.find(x=>x.key===key);showModal(`<h2>Claim ${s.name}</h2><p>Enter your player name and create a three-digit PIN. This stays fixed until the serial ends.</p><div class="loginRow"><input id="claimName" placeholder="Name"><input id="claimPin" class="pin" placeholder="PIN" maxlength="3" inputmode="numeric"></div><div class="modalBtns"><button class="primary" onclick="finishClaim('${key}')">Claim Ship</button><button class="secondary" onclick="closeModal()">Cancel</button></div>`)}
function finishClaim(key){let n=document.getElementById('claimName').value.trim(), p=document.getElementById('claimPin').value.trim(); if(!n||!/^[0-9]{3}$/.test(p)) return; let s=state.slots.find(x=>x.key===key); s.claimed=true;s.player=n;s.pin=p; me=key; localStorage.setItem(DB_ID+'_me',me); state.log.push(`${s.name} claimed by ${n} (${now()})`); if(allClaimed()){state.phase='active';state.log.push(`All selected ships manned. Exercise active (${now()})`)} closeModal(); persist(); showBriefing()}
function login(){let k=document.getElementById('loginShip').value, p=document.getElementById('loginPin').value.trim(), s=state.slots.find(x=>x.key===k); if(s.pin!==p)return showModal(`<h2>Access Denied</h2><p>Incorrect PIN.</p><button class="primary" onclick="closeModal()">Close</button>`); me=k;localStorage.setItem(DB_ID+'_me',me); render(); if(!localStorage.getItem(DB_ID+'_brief_'+me))showBriefing()}
function showBriefing(){localStorage.setItem(DB_ID+'_brief_'+me,'1');let s=mine();showModal(`<h2>Signal Received</h2><div class="signal">EXERCISE DRAGON SQUADRON SURFEX\n\nTO: COMMANDING OFFICER, ${s?.name||'ASSIGNED VESSEL'}\nFROM: OFFICER COMMANDING, DRAGON SQUADRON\n\n1. You are to proceed as directed within Hong Kong waters and conduct independent surface search, identification and interception drills.\n\n2. The exercise area contains civilian traffic, small craft and concealed hostile units. You are to maintain tactical discretion. Excessive speed, erratic manoeuvre or careless use of force may compromise your position.\n\n3. Radar detects surface contacts within 12 nautical miles, subject to masking by land. The radar plotter may analyse one contact only. Lookout may visually identify one contact within 6 nautical miles.\n\n4. Engage only when satisfied as to target identity and tactical necessity.\n\nSIGNED\nA. HARRINGTON\nCommander RN\nOfficer Commanding Dragon Squadron</div><button class="primary" onclick="closeModal();render()">Acknowledge</button>`)}
function renderWaiting(app){let s=mine();let submitted=Object.keys(state.submitted).length, total=state.playerCount; let allow=allClaimed() && state.firstSubmittedAt && Date.now()-state.firstSubmittedAt>30*60*1000; app.innerHTML=`<div class="title"><div class="panel waiting"><img class="token" src="${s.img}"><h2>${s.name}</h2><p>Orders submitted. You are locked out until the turn resolves.</p><div class="big">${submitted}/${total}</div><p>${submitted===total?'All orders received. Resolving shortly.':'Awaiting remaining ships.'}</p>${allow?`<button class="primary" onclick="resolveTurn()">Advance Turn</button>`:''}<button class="secondary" onclick="showDashboard()">Dashboard</button></div></div>`; if(submitted===total)setTimeout(resolveTurn,1200)}
function renderGame(app){let s=mine(), o=order(); if(!o.course)o.course=state.own.course;if(!o.speed)o.speed=state.own.speed; app.innerHTML=`<div class="game"><div class="top"><button class="commit" onclick="commitOrders()">COMMIT<br>ORDERS</button><div class="timeBox"><div class="t">${fmtTime()}</div><div class="turn">TURN ${state.turn} · ${s.name.replace('HMS ','')}</div></div><div class="statusBox"><div class="check"><span>Lookout</span><b class="${o.lookout?'yes':'no'}">${o.lookout?'✓':'–'}</b></div><div class="check"><span>Radar</span><b class="${o.radar?'yes':'no'}">${o.radar?'✓':'–'}</b></div><div class="check"><span>76mm</span><b class="${o.gun?'yes':'no'}">${o.gun?'✓':'–'}</b></div></div></div><div class="chartWrap" id="chartWrap"><div class="chart" id="chart"></div><div class="zoomBtns"><button onclick="zoom(1.2)">+</button><button onclick="zoom(.84)">−</button></div></div><div class="control"><div class="compass" id="compass"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="43" fill="#062033" stroke="#2d7294" stroke-width="2"/><text x="50" y="13" fill="#a9bed0" text-anchor="middle" font-size="8">N</text><text x="88" y="53" fill="#a9bed0" text-anchor="middle" font-size="8">E</text><text x="50" y="93" fill="#a9bed0" text-anchor="middle" font-size="8">S</text><text x="12" y="53" fill="#a9bed0" text-anchor="middle" font-size="8">W</text><line id="courseNeedle" x1="50" y1="50" x2="50" y2="12" stroke="#6fd8ff" stroke-width="4" stroke-linecap="round"/></svg><div class="courseText" id="courseText">${o.course}°</div></div><div class="speedBox"><h3>${s.name} · SPEED</h3><div class="speedText" id="speedText">${o.speed} KTS</div><input id="speed" type="range" min="0" max="25" value="${o.speed}" oninput="setSpeed(this.value)"><div class="orderChecks"><span class="chip">Lookout <b class="${o.lookout?'yes':'no'}">${o.lookout?'✓':'–'}</b></span><span class="chip">Radar <b class="${o.radar?'yes':'no'}">${o.radar?'✓':'–'}</b></span><span class="chip">76mm <b class="${o.gun?'yes':'no'}">${o.gun?'✓':'–'}</b></span></div></div></div></div>`; drawChart();bindTouches();bindCompass();}
function drawChart(){let c=document.getElementById('chart'); if(!c)return; c.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${pan.z})`; c.innerHTML=`<div class="island" style="left:90px;top:495px;width:120px;height:96px"></div><div class="island" style="left:640px;top:135px;width:125px;height:82px"></div><div class="island" style="left:330px;top:690px;width:150px;height:108px"></div><div class="ring r6" style="left:${state.own.x}px;top:${state.own.y}px;width:360px;height:360px"></div><div class="ring r12" style="left:${state.own.x}px;top:${state.own.y}px;width:660px;height:660px"></div><div class="ring r18" style="left:${state.own.x}px;top:${state.own.y}px;width:900px;height:900px"></div>`; let o=order()||{course:state.own.course,speed:state.own.speed}; drawVector(c,state.own.x,state.own.y,o.course,o.speed,'#6fd8ff'); addTrack(c,{id:1001,x:state.own.x,y:state.own.y,type:'friend'},true); state.tracks.forEach(t=>{let dist=Math.hypot(t.x-state.own.x,t.y-state.own.y)/30;if(dist<=12||state.intel[t.id])addTrack(c,t,false)}); let ord=order()||{}; mark(ord.radar,'radarBox','RADAR','radar'); mark(ord.lookout,'lookoutBox','LOOKOUT','lookout'); mark(ord.gun,'gunBox','76MM','gun'); if(selected)mark(selected,'selectBox','',''); updateNeedle();}
function addTrack(c,t,own){let d=document.createElement('div');d.className='track '+(own?'own':'');d.style.left=t.x+'px';d.style.top=t.y+'px';d.onclick=e=>{e.stopPropagation();selectTrack(t.id)};d.innerHTML=`<span class="sym ${own?'friend':t.type||'unk'}"></span><span class="label">${t.id}</span>`;c.appendChild(d); let intel=state.intel[t.id]; if(intel?.radar){drawVector(c,t.x,t.y,t.course,t.speed,'#6fd8ff',true);(t.history||[]).forEach(h=>{let dot=document.createElement('div');dot.className='trailDot';dot.style.left=h.x+'px';dot.style.top=h.y+'px';c.appendChild(dot)})}}
function mark(id,cls,text,tc){if(!id)return;let t=state.tracks.find(x=>x.id==id);if(!t)return;let c=document.getElementById('chart');let b=document.createElement('div');b.className=cls;b.style.left=t.x+'px';b.style.top=t.y+'px';c.appendChild(b); if(text){let tag=document.createElement('div');tag.className='tag '+tc;tag.style.left=(t.x+8)+'px';tag.style.top=(t.y-45)+'px';tag.textContent=text;c.appendChild(tag)}}
function drawVector(c,x,y,course,speed,col,small){let r=course*Math.PI/180, scale=small?3.6:5, max=speed*9*scale/3; let l=document.createElementNS('http://www.w3.org/2000/svg','svg'); l.setAttribute('style',`position:absolute;left:${x-160}px;top:${y-160}px;width:320px;height:320px;overflow:visible;z-index:2;pointer-events:none`); let x2=160+Math.sin(r)*max, y2=160-Math.cos(r)*max; l.innerHTML=`<line x1="160" y1="160" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="4"/><circle cx="${160+Math.sin(r)*max/3}" cy="${160-Math.cos(r)*max/3}" r="5" fill="${col}"/><circle cx="${160+Math.sin(r)*max*2/3}" cy="${160-Math.cos(r)*max*2/3}" r="5" fill="${col}"/><circle cx="${x2}" cy="${y2}" r="5" fill="${col}"/>`; c.appendChild(l)}
function selectTrack(id){selected=id;drawChart();let t=state.tracks.find(x=>x.id==id), o=order(), dist=(Math.hypot(t.x-state.own.x,t.y-state.own.y)/30).toFixed(1);showModal(`<h2>Track ${id}</h2><p>Range ${dist} nm. Bearing ${bearingTo(t)}°.</p><div class="contactActions"><button class="lookout" onclick="assign('lookout',${id})">Lookout</button><button onclick="assign('radar',${id})">Radar Plot</button><button class="gun" onclick="assign('gun',${id})">76mm</button></div><button class="secondary" style="margin-top:10px;width:100%" onclick="closeModal()">Close</button>`)}
function bearingTo(t){let dx=t.x-state.own.x,dy=t.y-state.own.y;return Math.round((Math.atan2(dx,-dy)*180/Math.PI+360)%360)}
function assign(kind,id){if(kind==='lookout'&&Math.hypot(state.tracks.find(t=>t.id==id).x-state.own.x,state.tracks.find(t=>t.id==id).y-state.own.y)/30>6)return showModal('<h2>Out of Range</h2><p>Lookout must be within 6 nm.</p><button class="primary" onclick="closeModal()">Close</button>'); order()[kind]=id;closeModal();drawChart();persist()}
function setSpeed(v){order().speed=+v;document.getElementById('speedText').textContent=v+' KTS';drawChart();persist()} function setCourse(v){order().course=(Math.round(v)+360)%360;document.getElementById('courseText').textContent=order().course+'°';updateNeedle();drawChart();persist()} function updateNeedle(){let n=document.getElementById('courseNeedle'), o=order(); if(n&&o)n.setAttribute('transform',`rotate(${o.course} 50 50)`)}
function bindCompass(){let el=document.getElementById('compass');el.onpointerdown=el.onpointermove=e=>{if(e.buttons===0&&e.type==='pointermove')return;let r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;setCourse((Math.atan2(e.clientX-cx,cy-e.clientY)*180/Math.PI+360)%360)}}
function bindTouches(){let wrap=document.getElementById('chartWrap');wrap.onwheel=e=>{e.preventDefault();zoom(e.deltaY<0?1.1:.9)};wrap.ontouchstart=e=>{if(e.touches.length===1)touch={x:e.touches[0].clientX,y:e.touches[0].clientY,px:pan.x,py:pan.y};else if(e.touches.length===2){let a=e.touches[0],b=e.touches[1];touch={d:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),z:pan.z}}};wrap.ontouchmove=e=>{e.preventDefault();if(e.touches.length===1&&touch?.x!=null){pan.x=touch.px+e.touches[0].clientX-touch.x;pan.y=touch.py+e.touches[0].clientY-touch.y;drawChart()}else if(e.touches.length===2&&touch?.d){let a=e.touches[0],b=e.touches[1];pan.z=Math.max(.45,Math.min(2.2,touch.z*Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)/touch.d));drawChart()}},{passive:false}}
function zoom(f){pan.z=Math.max(.45,Math.min(2.2,pan.z*f));drawChart()}
function commitOrders(){if(!allClaimed())return showModal('<h2>Serial Not Fully Manned</h2><p>All selected player slots must be claimed before orders can be submitted.</p><button class="primary" onclick="closeModal()">Close</button>'); let o=order();showModal(`<h2>Captain's Orders</h2><p>Course ${o.course}°, speed ${o.speed} kts.</p><p>Lookout: ${o.lookout?'Track '+o.lookout:'not assigned'}<br>Radar: ${o.radar?'Track '+o.radar:'not assigned'}<br>76mm: ${o.gun?'Track '+o.gun:'not assigned'}</p><div class="modalBtns"><button class="primary" onclick="finishSubmit()">Submit Orders</button><button class="secondary" onclick="closeModal()">Return</button></div>`)}
function finishSubmit(){state.submitted[me]=true;if(!state.firstSubmittedAt)state.firstSubmittedAt=Date.now();state.log.push(`${mine().name} submitted orders (${now()})`);closeModal();persist();render()}
function resolveTurn(){if(!allClaimed())return; let keys=activeSlots().map(s=>s.key); keys.forEach(k=>{let o=state.orders[k]||{}; if(o.radar){let t=state.tracks.find(x=>x.id==o.radar); if(t){state.intel[t.id]={radar:true,course:t.course,speed:t.speed,size:t.size}; t.history ||= []; t.history.push({x:t.x,y:t.y}); if(t.history.length>6)t.history.shift();}} if(o.lookout){let t=state.tracks.find(x=>x.id==o.lookout); if(t)t.type='neutral'} }); state.own.course=order()?.course||state.own.course; state.own.speed=order()?.speed||state.own.speed; moveAll(); state.turn++; state.timeMins+=3; state.submitted={}; state.firstSubmittedAt=null; keys.forEach(k=>state.reports[k]=`Turn ${state.turn} report: radar and lookout updates plotted.`); persist(); render(); showReport();}
function moveAll(){[state.own,...state.tracks].forEach(t=>{let r=(t.course||0)*Math.PI/180,d=(t.speed||0)*2.5;t.x+=Math.sin(r)*d;t.y-=Math.cos(r)*d;if(t.x<40||t.x>860)t.course=360-(t.course||0);if(t.y<40||t.y>860)t.course=180-(t.course||0); if(!t.slot&&Math.random()<.25)t.course=((t.course||0)+[-20,20,15,-15][Math.floor(Math.random()*4)]+360)%360})}
function showReport(){let r=state.reports[me]; if(r)showModal(`<img src="event_bridge.png" style="width:100%;border-radius:14px"><h2>Turn Report</h2><p>${r}</p><button class="primary" onclick="delete state.reports[me];persist();closeModal();render()">Continue</button>`) }
function showModal(html){let d=document.createElement('div');d.className='modalShade';d.id='modal';d.innerHTML='<div class="modal">'+html+'</div>';document.body.appendChild(d)} function closeModal(){document.getElementById('modal')?.remove()} function showDashboard(){showModal(`<h2>Exercise Dashboard</h2><p>Serial ${state.serial}. Slots ${activeSlots().length}/${state.playerCount||0}.</p><pre style="white-space:pre-wrap;color:#cfe">${(state.log||[]).slice(-12).reverse().join('\n')}</pre><button class="primary" onclick="closeModal()">Close</button>`)} function showScore(){showModal(`<h2>Scoreboard</h2><p>No completed wins recorded in this test build.</p><button class="primary" onclick="closeModal()">Close</button>`)}
load();
</script></body></html>
