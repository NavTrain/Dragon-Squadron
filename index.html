<style>
:root{--bg:#020912;--panel:rgba(5,22,35,.91);--line:#2c7294;--cyan:#6fd8ff;--green:#86ff72;--gold:#d7a941;--red:#ff5c68;--text:#ecf7ff;--muted:#a9bed0}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#020912;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select{font:inherit;color:inherit}.app{height:100dvh;width:100vw;overflow:hidden;background:#020912}.hidden{display:none!important}
.title{height:100dvh;overflow:auto;background:linear-gradient(rgba(0,8,14,.2),rgba(0,8,14,.74)),url('title_bg.png') center 42%/cover no-repeat;padding:calc(10px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));display:flex;flex-direction:column}.brand{text-align:center;text-shadow:0 3px 12px #000;margin:0 auto 10px}.brand h1{margin:0;font-size:31px;line-height:.94;letter-spacing:.06em;font-weight:1000}.brand .sub{letter-spacing:.45em;margin-top:4px;font-weight:900}.panel{background:linear-gradient(180deg,rgba(7,30,46,.94),rgba(3,16,26,.94));border:1px solid rgba(103,211,255,.35);border-radius:22px;box-shadow:0 18px 38px rgba(0,0,0,.5);padding:14px;margin:0 auto 10px;width:100%;max-width:720px}.panel h2{margin:0 0 10px;text-align:center;letter-spacing:.13em;font-weight:1000}.panel p{color:#c8dbe8;line-height:1.35}.setupGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.setupGrid button,.primary,.secondary,.danger{border:1px solid rgba(103,211,255,.28);border-radius:14px;background:rgba(9,45,70,.92);color:var(--text);font-weight:1000;padding:13px 8px;min-width:0}.primary{background:linear-gradient(#20a55c,#0d773e);border-color:#3bd779}.danger{background:linear-gradient(#93313d,#5d1722);border-color:#e4606d}.secondary{background:rgba(9,45,70,.9)}.slot{display:grid;grid-template-columns:68px 1fr auto;gap:10px;align-items:center;border:1px solid rgba(103,211,255,.25);border-radius:18px;padding:9px;margin:8px 0;background:rgba(0,9,15,.58)}.token{width:62px;height:62px;border-radius:50%;object-fit:cover;box-shadow:0 3px 12px #000;border:1px solid rgba(255,221,124,.65)}.slot h3{margin:0;font-size:17px}.slot p{margin:2px 0 0;color:var(--muted);font-size:13px}.badge{font-size:12px;letter-spacing:.1em;font-weight:1000;border-radius:999px;padding:9px 10px;background:#735914;color:#ffe790}.ready{background:#116a34;color:#bcffba}.loginRow{display:flex;gap:8px}.loginRow input,.loginRow select,.field{min-width:0;flex:1;border:1px solid rgba(103,211,255,.32);border-radius:14px;background:#061a2a;color:#fff;padding:13px}.loginRow input.pin{flex:0 0 82px;text-align:center;letter-spacing:.25em}
.game{height:100dvh;padding:calc(7px + env(safe-area-inset-top)) 7px calc(7px + env(safe-area-inset-bottom));display:grid;grid-template-rows:62px minmax(0,1fr) 25dvh;gap:7px;background:#020912}.top{display:grid;grid-template-columns:112px 1fr 128px;gap:7px;align-items:stretch}.commit{border-radius:16px;border:1px solid #42d783;background:linear-gradient(#1fa55d,#0b6d39);color:white;font-weight:1000;font-size:13px;letter-spacing:.08em}.timeBox,.statusBox{border:1px solid rgba(103,211,255,.28);border-radius:16px;background:linear-gradient(180deg,rgba(7,29,45,.96),rgba(3,15,25,.96));padding:7px}.timeBox{text-align:center}.timeBox .t{font-size:23px;font-weight:1000}.timeBox .turn{font-size:11px;color:var(--muted);letter-spacing:.11em}.statusBox{font-size:11px;display:grid;gap:1px}.check{display:flex;justify-content:space-between;gap:4px;align-items:center;white-space:nowrap}.yes{color:var(--green);font-weight:1000}.no{color:#587080;font-weight:1000}
.chartWrap{position:relative;border:1px solid rgba(103,211,255,.36);border-radius:18px;overflow:hidden;background:#051928;touch-action:none;min-height:0}.chart{position:absolute;left:0;top:0;width:1024px;height:1024px;transform-origin:0 0;background:url('chart_map.png') center/100% 100% no-repeat}.chart:before{content:"";position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(110,216,255,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(110,216,255,.18) 1px,transparent 1px);background-size:51.2px 51.2px}.ring{position:absolute;border:3px dashed;border-radius:50%;transform:translate(-50%,-50%);opacity:.82;pointer-events:none}.r6{border-color:#67d66b}.r12{border-color:#ff5c68}.r18{border-color:#55cfff}.track{position:absolute;transform:translate(-50%,-50%);z-index:4}.sym{width:34px;height:34px;filter:drop-shadow(0 3px 3px #000);display:inline-block}.sym.unk{background:#ffdf5f;border:3px solid #493600;border-radius:46% 54% 45% 55%;clip-path:polygon(50% 0,65% 31%,100% 50%,65% 69%,50% 100%,35% 69%,0 50%,35% 31%)}.sym.friend{border-radius:50%;background:#6fd8ff;border:3px solid #04121a}.sym.neutral{background:#6aff72;border:3px solid #113b18}.sym.hostile{background:#ff6670;border:3px solid #491015;transform:rotate(45deg)}.label{position:absolute;left:31px;top:3px;font-weight:1000;font-size:20px;text-shadow:0 2px 2px #000,0 0 4px #000}.own .label{left:42px}.selectBox,.radarBox,.lookoutBox,.gunBox{position:absolute;transform:translate(-50%,-50%);border:3px solid;z-index:3;pointer-events:none}.selectBox{width:68px;height:68px;border-color:#fff}.radarBox{width:84px;height:72px;border-color:#6fd8ff}.lookoutBox{width:74px;height:74px;border-radius:50%;border-color:#7cff8b}.gunBox{width:76px;height:76px;border-color:#ff6472}.tag{position:absolute;transform:translate(-50%,-50%);font-size:12px;font-weight:1000;letter-spacing:.08em;padding:4px 6px;border-radius:6px;background:rgba(0,8,14,.82);z-index:5}.tag.radar{color:#6fd8ff}.tag.lookout{color:#7cff8b}.tag.gun{color:#ff6472}.trailDot{position:absolute;width:8px;height:8px;background:#6fd8ff;border-radius:50%;opacity:.75;z-index:2}.zoomBtns{position:absolute;right:9px;top:9px;display:grid;gap:8px;z-index:8}.zoomBtns button{width:50px;height:50px;border-radius:14px;border:1px solid rgba(103,211,255,.35);background:rgba(3,16,26,.78);color:#fff;font-size:26px;font-weight:1000}
.control{border:1px solid rgba(103,211,255,.3);border-radius:18px;background:rgba(3,16,26,.92);display:grid;grid-template-columns:42% 1fr;gap:10px;padding:9px;min-height:0}.compass{position:relative;border:1px solid rgba(103,211,255,.25);border-radius:16px;background:rgba(7,28,43,.78);display:flex;align-items:center;justify-content:center;min-height:0}.compass svg{width:min(100%,23dvh);height:min(100%,23dvh)}.courseText{position:absolute;bottom:7px;left:0;right:0;text-align:center;font-weight:1000;color:var(--green);font-size:25px}.speedBox{display:grid;grid-template-rows:auto 1fr auto;align-items:center}.speedBox h3{margin:0;letter-spacing:.12em;font-size:12px}.speedText{font-size:32px;font-weight:1000;color:var(--green);text-align:center}.speedBox input{width:100%;accent-color:#6fd8ff}.orderChecks{display:flex;gap:6px;flex-wrap:wrap;font-size:11px}.chip{border:1px solid rgba(103,211,255,.25);border-radius:999px;padding:6px 8px;background:rgba(6,33,51,.9)}
.modalShade{position:fixed;inset:0;background:rgba(0,5,9,.72);z-index:40;display:flex;align-items:center;justify-content:center;padding:16px}.modal{width:min(700px,100%);max-height:88dvh;overflow:auto;background:linear-gradient(180deg,rgba(8,32,49,.98),rgba(3,13,22,.98));border:1px solid rgba(103,211,255,.38);border-radius:22px;padding:16px;box-shadow:0 25px 70px #000}.modal h2{margin:0 0 10px;font-size:26px}.modal p{color:#c7d8e4;line-height:1.35}.modalBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.contactActions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.contactActions button{padding:12px 6px;border-radius:12px;border:1px solid rgba(103,211,255,.35);background:#103a59;color:#fff;font-weight:900}.contactActions .lookout{border-color:#69e978}.contactActions .gun{border-color:#ff6472;background:#651925}.signal{font-family:"Courier New",monospace;background:#e9dcc4;color:#16212b;border-radius:10px;padding:16px;white-space:pre-wrap}.waiting{text-align:center}.waiting .big{font-size:44px;color:var(--green);font-weight:1000}.eventImg{width:100%;border-radius:14px;border:1px solid rgba(103,211,255,.25)}
@media (max-height:760px){.game{grid-template-rows:58px minmax(0,1fr) 27dvh}.top{grid-template-columns:104px 1fr 112px}.brand h1{font-size:28px}.control{padding:8px}.speedText{font-size:28px}.courseText{font-size:22px}.commit{font-size:12px}.token{width:56px;height:56px}.slot{grid-template-columns:62px 1fr auto}}

<body><div id="app" class="app"></div>
<script>
const SUPABASE_URL='https://jxlfaxspqwrypuqyicgo.supabase.co';
const SUPABASE_KEY='sb_publishable_y8HU_XOU7JTUTZdqEqxTyQ_wZWgEwP-';
const DB_TABLE='dragon_squadron_state';
const DB_ID='main_mobile_v11';
let sb=null;try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)}catch(e){}
const SHIPS=[['peacock','HMS Peacock P239','peacock_token.png'],['plover','HMS Plover P240','plover_token.png'],['starling','HMS Starling P241','starling_token.png'],['swallow','HMS Swallow P242','swallow_token.png'],['swift','HMS Swift P243','swift_token.png']];
const STARTS=[{x:505,y:620,c:040},{x:635,y:540,c:310},{x:420,y:365,c:130},{x:720,y:700,c:275},{x:350,y:650,c:085}];
let state=null, me=null, selected=null, pan={x:-120,y:-170,z:0.82}, touch=null, resolving=false;
function shuffle(a){return a.sort(()=>Math.random()-.5)}function now(){return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}function fmtTime(){let m=state.timeMins||480;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}function saveLocal(){localStorage.setItem(DB_ID,JSON.stringify(state))}
function newState(){return {version:'mobile-v11',phase:'empty',serial:'N-'+new Date().toISOString().slice(0,10).replaceAll('-','')+'-'+Math.floor(10+Math.random()*89),playerCount:0,turn:1,timeMins:480,slots:[],ships:[],tracks:[],orders:{},intel:{},submitted:{},reports:{},log:[],firstSubmittedAt:null,scoreboard:[]}}
function makeSerial(n){let chosen=shuffle(SHIPS.slice()).slice(0,n);state={...newState(),phase:'active',playerCount:n,slots:[],ships:[]};chosen.forEach((s,i)=>{let st=STARTS[i];state.slots.push({slot:i+1,key:s[0],name:s[1],img:s[2],claimed:false,player:'',pin:''});state.ships.push({slot:i+1,key:s[0],name:s[1],id:1001+i,x:st.x,y:st.y,course:st.c,speed:10,alive:true,hist:[]});state.orders[s[0]]={course:st.c,speed:10,radar:null,lookout:null,gun:null};state.reports[s[0]]=[]});genTracks();state.log.push(`Serial created for ${n} ships (${now()}). Unclaimed ships are active on standing orders.`);persist();render()}
function genTracks(){let pts=[[250,265,105,18],[810,230,260,16],[185,610,80,7],[745,510,285,19],[555,310,175,14],[350,750,45,8],[895,715,300,17],[215,815,65,11],[690,820,335,20],[455,220,130,15],[880,360,250,6],[610,165,210,18],[315,475,95,16],[780,640,310,7],[505,805,25,15],[155,375,110,9],[930,520,270,18],[385,885,55,6]];state.tracks=pts.slice(0, state.playerCount<3?14:state.playerCount<5?17:18).map((p,i)=>({id:1012+i,x:p[0],y:p[1],course:p[2],speed:p[3],type:'unk',actualType:p[3]>=15?'merchant vessel':'fishing vessel',size:p[3]>=15?'large':'small',history:[]}))}
function selectedSlots(){return state.slots||[]}function claimedSlots(){return selectedSlots().filter(s=>s.claimed)}function mine(){return state.slots.find(s=>s.key===me)}function myShip(){return state.ships.find(s=>s.key===me)}function order(){let m=mine(), sh=myShip();if(!m||!sh)return null;state.orders[m.key] ||= {course:sh.course,speed:sh.speed,radar:null,lookout:null,gun:null};return state.orders[m.key]}
async function persist(){saveLocal();try{if(sb)await sb.from(DB_TABLE).upsert({id:DB_ID,state,updated_at:new Date().toISOString()})}catch(e){console.warn(e)}}
async function load(){state=JSON.parse(localStorage.getItem(DB_ID)||'null')||newState();try{if(sb){let {data}=await sb.from(DB_TABLE).select('state').eq('id',DB_ID).maybeSingle();if(data?.state)state=data.state;else await persist();sb.channel('public:'+DB_ID).on('postgres_changes',{event:'UPDATE',schema:'public',table:DB_TABLE,filter:'id=eq.'+DB_ID},p=>{if(p.new?.state){state=p.new.state;render()}}).subscribe()}}catch(e){console.warn(e)}render()}
function render(){let app=document.getElementById('app');if(!me&&localStorage.getItem(DB_ID+'_me'))me=localStorage.getItem(DB_ID+'_me');if(me&&!state.slots?.some(s=>s.key===me&&s.claimed)){localStorage.removeItem(DB_ID+'_me');me=null}if(state.phase==='empty'||!me)return renderTitle(app);if(state.submitted[me])return renderWaiting(app);return renderGame(app)}
function renderTitle(app){let claimed=claimedSlots().length;app.innerHTML=`<div class="title"><div class="brand"><h1>DRAGON<br>SQUADRON</h1><div class="sub">SURFEX</div></div><div class="panel"><h2>EXERCISE ACCESS</h2>${state.phase==='empty'?`<p>Select player count for the new serial. This creates every selected ship immediately; unclaimed ships remain active on standing orders.</p><div class="setupGrid">${[2,3,4,5].map(n=>`<button onclick="makeSerial(${n})">${n} SHIPS</button>`).join('')}</div>`:`<div style="display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px"><div class="secondary">Serial<br><b style="color:var(--green);font-size:22px">${state.serial}</b></div><div class="secondary">Claimed<br><b style="color:var(--green);font-size:22px">${claimed}/${state.playerCount}</b></div></div>${state.slots.map(s=>`<div class="slot"><img class="token" src="${s.img}"><div><h3>Player ${s.slot} — ${s.name}</h3><p>${s.claimed?s.player:'Unclaimed — standing orders'}</p></div>${s.claimed?`<span class="badge ready">CLAIMED</span>`:`<button class="badge" onclick="claim('${s.key}')">CLAIM</button>`}</div>`).join('')}${claimed?`<div class="panel" style="margin:10px 0 0;padding:10px"><h2 style="font-size:16px">ENTER CLAIMED SHIP</h2><div class="loginRow"><select id="loginShip" class="secondary" style="flex:1">${state.slots.filter(s=>s.claimed).map(s=>`<option value="${s.key}">${s.name}</option>`)}</select><input id="loginPin" class="pin" placeholder="PIN" maxlength="3" inputmode="numeric"><button class="primary" onclick="login()">ENTER</button></div></div>`:''}`}</div><div class="panel"><button class="secondary" onclick="showDashboard()">Dashboard</button> <button class="secondary" onclick="showScore()">Scoreboard</button> <button class="danger" onclick="resetDialog()">Reset</button></div></div>`}
function claim(key){let s=state.slots.find(x=>x.key===key);showModal(`<h2>Claim ${s.name}</h2><p>Enter your player name and create a three-digit PIN. This remains fixed until reset.</p><div class="loginRow"><input id="claimName" placeholder="Name"><input id="claimPin" class="pin" placeholder="PIN" maxlength="3" inputmode="numeric"></div><div class="modalBtns"><button class="primary" onclick="finishClaim('${key}')">Claim Ship</button><button class="secondary" onclick="closeModal()">Cancel</button></div>`)}
function finishClaim(key){let s=state.slots.find(x=>x.key===key), n=document.getElementById('claimName').value.trim(), p=document.getElementById('claimPin').value.trim();if(!n||!/^[0-9]{3}$/.test(p))return showModal('<h2>Check Entry</h2><p>Use a name and a three-digit PIN.</p><button class="primary" onclick="closeModal()">Close</button>');s.claimed=true;s.player=n;s.pin=p;me=key;localStorage.setItem(DB_ID+'_me',key);state.log.push(`${s.name} claimed by ${n} (${now()})`);closeModal();persist();showBriefing()}
function login(){let k=document.getElementById('loginShip').value,p=document.getElementById('loginPin').value.trim(),s=state.slots.find(x=>x.key===k);if(s.pin!==p)return showModal(`<h2>Access Denied</h2><p>Incorrect PIN.</p><button class="primary" onclick="closeModal()">Close</button>`);me=k;localStorage.setItem(DB_ID+'_me',me);render();if(!localStorage.getItem(DB_ID+'_brief_'+me))showBriefing()}
function showBriefing(){localStorage.setItem(DB_ID+'_brief_'+me,'1');let s=mine();showModal(`<div class="signal">EXERCISE DRAGON SQUADRON SURFEX\nFROM: OFFICER COMMANDING DRAGON SQUADRON\nTO: COMMANDING OFFICER ${s.name}\nDTG: 0800Z\n\n1. Conduct surface exercise in Hong Kong waters.\n2. Maintain the surface picture. Use course, speed, radar plotter, lookout and 76mm tasking.\n3. Unclaimed squadron units remain active on standing orders until claimed by their assigned players.\n\nA. J. WHITMORE\nCommander, Royal Navy</div><button class="primary" style="width:100%;margin-top:12px" onclick="closeModal();render()">Enter Tactical Screen</button>`)}
function renderWaiting(app){let s=mine();let submitted=Object.keys(state.submitted||{}).length,total=Math.max(1,claimedSlots().length);app.innerHTML=`<div class="title"><div class="panel waiting"><img class="token" src="${s.img}"><h2>${s.name}</h2><p>Orders submitted. Claimed ships must submit; unclaimed ships continue on standing orders.</p><div class="big">${submitted}/${total}</div><p>${submitted>=total?'All claimed ship orders received. Resolving shortly.':'Awaiting other claimed ships.'}</p><button class="secondary" onclick="showDashboard()">Dashboard</button></div></div>`;if(submitted>=total&&!resolving){resolving=true;setTimeout(()=>resolveTurn(),900)}}
function renderGame(app){let s=mine(),sh=myShip(),o=order();if(o.course==null)o.course=sh.course;if(o.speed==null)o.speed=sh.speed;app.innerHTML=`<div class="game"><div class="top"><button class="commit" onclick="commitOrders()">COMMIT<br>ORDERS</button><div class="timeBox"><div class="t">${fmtTime()}</div><div class="turn">TURN ${state.turn} · ${s.name.replace('HMS ','')}</div></div><div class="statusBox"><div class="check"><span>Lookout</span><b class="${o.lookout?'yes':'no'}">${o.lookout?'✓':'–'}</b></div><div class="check"><span>Radar</span><b class="${o.radar?'yes':'no'}">${o.radar?'✓':'–'}</b></div><div class="check"><span>76mm</span><b class="${o.gun?'yes':'no'}">${o.gun?'✓':'–'}</b></div></div></div><div class="chartWrap" id="chartWrap"><div class="chart" id="chart"></div><div class="zoomBtns"><button onclick="zoom(1.2)">+</button><button onclick="zoom(.84)">−</button></div></div><div class="control"><div class="compass" id="compass"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="43" fill="#062033" stroke="#2d7294" stroke-width="2"/><text x="50" y="13" fill="#a9bed0" text-anchor="middle" font-size="8">N</text><text x="88" y="53" fill="#a9bed0" text-anchor="middle" font-size="8">E</text><text x="50" y="93" fill="#a9bed0" text-anchor="middle" font-size="8">S</text><text x="12" y="53" fill="#a9bed0" text-anchor="middle" font-size="8">W</text><line id="courseNeedle" x1="50" y1="50" x2="50" y2="12" stroke="#6fd8ff" stroke-width="4" stroke-linecap="round"/></svg><div class="courseText" id="courseText">${o.course}°</div></div><div class="speedBox"><h3>${s.name} · SPEED</h3><div class="speedText" id="speedText">${o.speed} KTS</div><input id="speed" type="range" min="0" max="25" value="${o.speed}" oninput="setSpeed(this.value)"><div class="orderChecks"><span class="chip">Lookout <b class="${o.lookout?'yes':'no'}">${o.lookout?'✓':'–'}</b></span><span class="chip">Radar <b class="${o.radar?'yes':'no'}">${o.radar?'✓':'–'}</b></span><span class="chip">76mm <b class="${o.gun?'yes':'no'}">${o.gun?'✓':'–'}</b></span></div></div></div></div>`;drawChart();bindTouches();bindCompass()}
function drawChart(){let c=document.getElementById('chart');if(!c||!me)return;c.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${pan.z})`;let sh=myShip(),o=order()||{course:sh.course,speed:sh.speed};c.innerHTML=`<div class="ring r6" style="left:${sh.x}px;top:${sh.y}px;width:360px;height:360px"></div><div class="ring r12" style="left:${sh.x}px;top:${sh.y}px;width:720px;height:720px"></div><div class="ring r18" style="left:${sh.x}px;top:${sh.y}px;width:1080px;height:1080px"></div>`;drawVector(c,sh.x,sh.y,o.course,o.speed,'#6fd8ff');state.ships.filter(x=>x.alive).forEach(sp=>addTrack(c,{id:sp.id,x:sp.x,y:sp.y,type:sp.key===me?'friend':'friend',ship:true,key:sp.key},sp.key===me));state.tracks.forEach(t=>{let dist=Math.hypot(t.x-sh.x,t.y-sh.y)/30;if(dist<=12||state.intel[me]?.[t.id])addTrack(c,t,false)});let ord=order()||{};mark(ord.radar,'radarBox','RADAR','radar');mark(ord.lookout,'lookoutBox','LOOKOUT','lookout');mark(ord.gun,'gunBox','76MM','gun');if(selected)mark(selected,'selectBox','','');updateNeedle()}
function addTrack(c,t,own){let d=document.createElement('div');d.className='track '+(own?'own':'');d.style.left=t.x+'px';d.style.top=t.y+'px';d.onclick=e=>{e.stopPropagation();selectTrack(t.id)};d.innerHTML=`<span class="sym ${own?'friend':(t.ship?'friend':t.type||'unk')}"></span><span class="label">${t.id}</span>`;c.appendChild(d);let intel=state.intel[me]?.[t.id];if(intel?.radar){drawVector(c,t.x,t.y,t.course,t.speed,'#6fd8ff',true);(t.history||[]).forEach(h=>{let dot=document.createElement('div');dot.className='trailDot';dot.style.left=h.x+'px';dot.style.top=h.y+'px';c.appendChild(dot)})}}
function mark(id,cls,text,tc){if(!id)return;let t=state.tracks.find(x=>x.id==id);if(!t)return;let c=document.getElementById('chart'),b=document.createElement('div');b.className=cls;b.style.left=t.x+'px';b.style.top=t.y+'px';c.appendChild(b);if(text){let tag=document.createElement('div');tag.className='tag '+tc;tag.style.left=(t.x+8)+'px';tag.style.top=(t.y-45)+'px';tag.textContent=text;c.appendChild(tag)}}
function drawVector(c,x,y,course,speed,col,small){let r=course*Math.PI/180,scale=small?3.2:5,max=speed*9*scale/3;let l=document.createElementNS('http://www.w3.org/2000/svg','svg');l.setAttribute('style',`position:absolute;left:${x-160}px;top:${y-160}px;width:320px;height:320px;overflow:visible;z-index:2;pointer-events:none`);let x2=160+Math.sin(r)*max,y2=160-Math.cos(r)*max;l.innerHTML=`<line x1="160" y1="160" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="4"/><circle cx="${160+Math.sin(r)*max/3}" cy="${160-Math.cos(r)*max/3}" r="5" fill="${col}"/><circle cx="${160+Math.sin(r)*max*2/3}" cy="${160-Math.cos(r)*max*2/3}" r="5" fill="${col}"/><circle cx="${x2}" cy="${y2}" r="5" fill="${col}"/>`;c.appendChild(l)}
function selectTrack(id){let sh=myShip(), t=state.tracks.find(x=>x.id==id)||state.ships.find(x=>x.id==id);if(!t)return;selected=id;drawChart();let dist=(Math.hypot(t.x-sh.x,t.y-sh.y)/30).toFixed(1),isShip=!!t.key;showModal(`<h2>Track ${id}</h2><p>Range ${dist} nm. Bearing ${bearingTo(t)}°.${isShip?' Squadron unit.':''}</p>${isShip?'<p>Squadron units cannot be assigned as radar/lookout contacts in this build.</p>':`<div class="contactActions"><button class="lookout" onclick="assign('lookout',${id})">Lookout</button><button onclick="assign('radar',${id})">Radar Plot</button><button class="gun" onclick="assign('gun',${id})">76mm</button></div>`}<button class="secondary" style="margin-top:10px;width:100%" onclick="closeModal()">Close</button>`)}
function bearingTo(t){let sh=myShip(),dx=t.x-sh.x,dy=t.y-sh.y;return Math.round((Math.atan2(dx,-dy)*180/Math.PI+360)%360)}
function assign(kind,id){let t=state.tracks.find(x=>x.id==id),sh=myShip();if(!t)return;if(kind==='lookout'&&Math.hypot(t.x-sh.x,t.y-sh.y)/30>6)return showModal('<h2>Out of Range</h2><p>Lookout must be within 6 nm.</p><button class="primary" onclick="closeModal()">Close</button>');if(kind==='gun'&&Math.hypot(t.x-sh.x,t.y-sh.y)/30>12)return showModal('<h2>Out of Range</h2><p>76mm engagement must be within 12 nm.</p><button class="primary" onclick="closeModal()">Close</button>');order()[kind]=id;closeModal();drawChart();persist()}
function setSpeed(v){order().speed=+v;document.getElementById('speedText').textContent=v+' KTS';drawChart();persist()}function setCourse(v){order().course=(Math.round(v)+360)%360;document.getElementById('courseText').textContent=order().course+'°';updateNeedle();drawChart();persist()}function updateNeedle(){let n=document.getElementById('courseNeedle'),o=order();if(n&&o)n.setAttribute('transform',`rotate(${o.course} 50 50)`)}
function bindCompass(){let el=document.getElementById('compass');el.onpointerdown=el.onpointermove=e=>{if(e.buttons===0&&e.type==='pointermove')return;let r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;setCourse((Math.atan2(e.clientX-cx,cy-e.clientY)*180/Math.PI+360)%360)}}
function bindTouches(){let wrap=document.getElementById('chartWrap');wrap.onwheel=e=>{e.preventDefault();zoom(e.deltaY<0?1.1:.9)};wrap.ontouchstart=e=>{if(e.touches.length===1)touch={x:e.touches[0].clientX,y:e.touches[0].clientY,px:pan.x,py:pan.y};else if(e.touches.length===2){let a=e.touches[0],b=e.touches[1];touch={d:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),z:pan.z}}};wrap.ontouchmove=e=>{e.preventDefault();if(e.touches.length===1&&touch?.x!=null){pan.x=touch.px+e.touches[0].clientX-touch.x;pan.y=touch.py+e.touches[0].clientY-touch.y;drawChart()}else if(e.touches.length===2&&touch?.d){let a=e.touches[0],b=e.touches[1];pan.z=Math.max(.45,Math.min(2.2,touch.z*Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)/touch.d));drawChart()}},{passive:false}}
function zoom(f){pan.z=Math.max(.45,Math.min(2.2,pan.z*f));drawChart()}
function commitOrders(){let o=order();showModal(`<h2>Captain's Orders</h2><p>This commits all orders for this turn.</p><p>Course ${o.course}°, speed ${o.speed} kts.</p><p>Lookout: ${o.lookout?'Track '+o.lookout:'not assigned'}<br>Radar: ${o.radar?'Track '+o.radar:'not assigned'}<br>76mm: ${o.gun?'Track '+o.gun:'not assigned'}</p><div class="modalBtns"><button class="primary" onclick="finishSubmit()">Submit Orders</button><button class="secondary" onclick="closeModal()">Return</button></div>`)}
function finishSubmit(){state.submitted[me]=true;if(!state.firstSubmittedAt)state.firstSubmittedAt=Date.now();state.log.push(`${mine().name} submitted orders (${now()})`);closeModal();persist();render()}
function resolveTurn(){resolving=false;let keys=state.slots.map(s=>s.key);keys.forEach(k=>{let sh=state.ships.find(x=>x.key===k),o=state.orders[k]||{course:sh.course,speed:sh.speed};if(!state.submitted[k])state.log.push(`${sh.name} continued on standing orders.`);sh.course=o.course??sh.course;sh.speed=o.speed??sh.speed;if(o.radar){let t=state.tracks.find(x=>x.id==o.radar);if(t){state.intel[k] ||= {};state.intel[k][t.id]={radar:true,course:t.course,speed:t.speed,size:t.size};t.history ||= [];t.history.push({x:t.x,y:t.y});if(t.history.length>6)t.history.shift()}}if(o.lookout){let t=state.tracks.find(x=>x.id==o.lookout);if(t){state.intel[k] ||= {};state.intel[k][t.id]={...(state.intel[k][t.id]||{}),identity:'neutral',type:t.actualType};t.type='neutral'}}});moveAll();state.turn++;state.timeMins+=3;state.submitted={};state.firstSubmittedAt=null;keys.forEach(k=>{state.reports[k]=`Turn ${state.turn} report: radar/lookout updates plotted. Unclaimed squadron ships remained on standing orders.`;let o=state.orders[k],sh=state.ships.find(x=>x.key===k);state.orders[k]={course:sh.course,speed:sh.speed,radar:o?.radar||null,lookout:null,gun:null}});persist();render();if(me)showReport()}
function moveAll(){[...state.ships,...state.tracks].forEach(t=>{if(!t.alive&&t.key)return;let r=(t.course||0)*Math.PI/180,d=(t.speed||0)*2.5;t.hist ||= [];t.hist.push({x:t.x,y:t.y});if(t.hist.length>10)t.hist.shift();t.x+=Math.sin(r)*d;t.y-=Math.cos(r)*d;if(t.x<65||t.x>960)t.course=360-(t.course||0);if(t.y<65||t.y>960)t.course=180-(t.course||0);t.x=Math.max(65,Math.min(960,t.x));t.y=Math.max(65,Math.min(960,t.y));if(!t.key&&Math.random()<.22)t.course=((t.course||0)+[-20,20,15,-15][Math.floor(Math.random()*4)]+360)%360})}
function showReport(){let r=state.reports[me];if(r)showModal(`<img src="event_bridge.png" class="eventImg"><h2>Turn Report</h2><p>${r}</p><button class="primary" onclick="delete state.reports[me];persist();closeModal();render()">Continue</button>`)}
function showModal(html){closeModal();let d=document.createElement('div');d.className='modalShade';d.id='modal';d.innerHTML='<div class="modal">'+html+'</div>';document.body.appendChild(d)}function closeModal(){document.getElementById('modal')?.remove()}
function showDashboard(){let claimed=claimedSlots().length;showModal(`<h2>Exercise Dashboard</h2><p>Serial ${state.serial}. Claimed ${claimed}/${state.playerCount||0}. All selected ships are active; unclaimed ships are on standing orders.</p><pre style="white-space:pre-wrap;color:#cfe">${(state.log||[]).slice(-12).reverse().join('\n')}</pre><button class="primary" onclick="closeModal()">Close</button>`)}function showScore(){showModal(`<h2>Scoreboard</h2><p>No completed wins recorded in this recovery build.</p><button class="primary" onclick="closeModal()">Close</button>`)}function resetDialog(){showModal(`<h2>Reset Serial</h2><p>Enter master PIN to reset the shared serial.</p><input id="masterPin" class="field" placeholder="PIN" inputmode="numeric"><div class="modalBtns"><button class="danger" onclick="doReset()">Reset</button><button class="secondary" onclick="closeModal()">Cancel</button></div>`)}function doReset(){if(document.getElementById('masterPin').value.trim()!=='1945')return showModal('<h2>Access Denied</h2><p>Incorrect master PIN.</p><button class="primary" onclick="closeModal()">Close</button>');state=newState();me=null;localStorage.removeItem(DB_ID+'_me');persist();closeModal();render()}
load();
</script>
</body>
</html>
